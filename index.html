<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <meta name="description" content="Drop a PDF, get AI-generated flashcards with spaced repetition. Study smarter with FlipWise." />

  <body>
    <script>
      // Apply persisted theme before paint to avoid FOUC
      try {
        if (localStorage.getItem('flipwise:theme') === 'dark') {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
